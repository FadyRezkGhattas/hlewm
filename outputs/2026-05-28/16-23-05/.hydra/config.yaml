cache_dir: null
world:
  env_name: swm/PushT-v1
  num_envs: ${eval.num_eval}
  max_episode_steps: ???
dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
  - action
  - proprio
  - state
seed: 42
policy: hlewm
l2_solver:
  _target_: stable_worldmodel.solver.CEMSolver
  model: ???
  batch_size: 1
  num_samples: 300
  var_scale: 1.0
  n_steps: 10
  topk: 30
  device: cuda
  seed: ${seed}
l1_solver:
  _target_: stable_worldmodel.solver.CEMSolver
  model: ???
  batch_size: 1
  num_samples: 300
  var_scale: 1.0
  n_steps: 30
  topk: 30
  device: cuda
  seed: ${seed}
l2_plan_config:
  horizon: 3
  receding_horizon: 1
  action_block: 1
  history_len: 1
  warm_start: false
l1_plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 5
  history_len: 1
  warm_start: true
eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: pusht_expert_train
  callables:
  - method: _set_state
    args:
      state:
        value: state
  - method: _set_goal_state
    args:
      goal_state:
        value: goal_state
output:
  filename: hpusht_results.txt
